# Scenario 4: Full End-to-End (Phase 05.3.1-02)
#
# Combines scenario 3 (button-triggered travel) with a complete door cycle.
# Exercises the full path from button press to elevator idle.
#
# Expected path:
#   FloorCallButton: Idle -> Lit (entry sends Floor_assigned)
#   Elevator: Idle -> Departing -> Moving -> Floor_Updating -> Arriving ->
#             Exchanging (entry sends Open_cmd to CarDoor) -> Idle
#   CarDoor: Closed -> Opening -> Open -> Closing -> Closed
#   ShaftDoor: Closed -> Opening -> Open -> Closing -> Closed
#   FloorCallButton: Lit -> Idle (Call_served from Exchanging entry)
#
# Required associations for preflight (same as scenario 3)

instances:
  - class: Elevator
    name: elev1
    id: {elevator_id: 1}
    state: Idle
    attrs:
      current_floor: 1
      next_stop_floor: 1

  - class: Shaft
    name: shaft1
    id: {shaft_id: 1}

  - class: Floor
    name: floor3
    id: {floor_num: 3}
    attrs:
      is_top_floor: true
      is_bottom_floor: false

  - class: ShaftFloor
    name: sf3
    id: {r2_shaft_id: 1, r3_floor_num: 3}
    attrs:
      sensor_id: 103

  - class: FloorCallButton
    name: fcb3
    id: {button_id: 3}
    state: Idle
    attrs:
      pressed_at: 0

  - class: CarDoor
    name: cardoor1
    id: {door_id: 1}
    state: Closed

  - class: ShaftDoor
    name: shaftdoor3
    id: {door_id: 3}
    state: Closed

relationships:
  - rel: R1
    a: elev1
    b: shaft1
  - rel: R2
    a: shaft1
    b: sf3
  - rel: R3
    a: floor3
    b: sf3
  - rel: R6
    a: floor3
    b: fcb3
  - rel: R7
    a: elev1
    b: cardoor1
  - rel: R8
    a: sf3
    b: shaftdoor3

events:
  - event: Activated
    target: fcb3
    sender: fcb3
    args: {}
    at_ms: 0

triggers:
  # Inject Floor_reached when elevator enters Moving
  - when:
      instance: elev1
      state: Moving
    then:
      event: Floor_reached
      target: elev1
      sender: elev1
      args: {floor_num: 3}
    repeat: false

  # Bypass ShaftDoor Opening delay
  - when:
      instance: shaftdoor3
      state: Opening
    then:
      event: Done_opening
      target: shaftdoor3
      sender: shaftdoor3
      args: {}
    repeat: false

  # Bypass CarDoor Open delay
  - when:
      instance: cardoor1
      state: Open
    then:
      event: Close_cmd
      target: cardoor1
      sender: cardoor1
      args: {}
    repeat: false

  # Bypass ShaftDoor Closing delay
  - when:
      instance: shaftdoor3
      state: Closing
    then:
      event: Done_closing
      target: shaftdoor3
      sender: shaftdoor3
      args: {}
    repeat: false
