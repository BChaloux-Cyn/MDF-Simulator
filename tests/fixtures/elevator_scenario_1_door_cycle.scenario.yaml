# Scenario 1: Door Open/Close Cycle (Phase 05.3.1-02)
#
# Exercises the full CarDoor + ShaftDoor open/close cycle.
# Elevator starts Idle; Open_cmd sent to CarDoor triggers:
#   CarDoor: Closed -> Opening -> Open -> Closing -> Closed
#   ShaftDoor: Closed -> Opening -> Open -> Closing -> Closed
#   Elevator: Idle -> (Door_closed ignored) -> Idle
#
# Clock timing: CarDoor.Open and ShaftDoor.Opening/Closing use delay events.
# Triggers inject the physical completion events to bypass wall-clock delays.
#
# Required associations for preflight:
#   R1: Elevator <-> Shaft (both "1")
#   R7: Elevator <-> CarDoor (both "1")
#   R8: ShaftFloor <-> ShaftDoor (both "1")
#   R2: ShaftFloor references Shaft
#   R3: ShaftFloor references Floor

instances:
  - class: Elevator
    name: elev1
    id: {elevator_id: 1}
    state: Idle
    attrs:
      current_floor: 1
      next_stop_floor: 1

  - class: Shaft
    name: shaft1
    id: {shaft_id: 1}

  - class: Floor
    name: floor1
    id: {floor_num: 1}
    attrs:
      is_top_floor: false
      is_bottom_floor: true

  - class: ShaftFloor
    name: sf1
    id: {r2_shaft_id: 1, r3_floor_num: 1}
    attrs:
      sensor_id: 101

  - class: CarDoor
    name: cardoor1
    id: {door_id: 1}
    state: Closed

  - class: ShaftDoor
    name: shaftdoor1
    id: {door_id: 2}
    state: Closed

relationships:
  - rel: R1
    a: elev1
    b: shaft1
  - rel: R2
    a: shaft1
    b: sf1
  - rel: R3
    a: floor1
    b: sf1
  - rel: R7
    a: elev1
    b: cardoor1
  - rel: R8
    a: sf1
    b: shaftdoor1

events:
  # Trigger the door cycle: send Open_cmd to CarDoor
  # The rest is handled entirely by the state machines via delayed self-events.
  - event: Open_cmd
    target: cardoor1
    sender: elev1
    args: {}
    at_ms: 0
