schema_version: "1.0.0"
domain: Elevator
classes:
  - name: Elevator
    stereotype: active
    attributes:
      - name: elevator_id
        type: UniqueID
        identifier: 1
      - name: current_floor
        type: FloorNumber
      - name: direction
        type: Direction
      - name: next_stop_floor
        type: FloorNumber
    methods:
      - name: _get_lit_buttons
        visibility: private
        scope: instance
        return: Set<DestFloorButton>
        action: |
          UniqueID my_id = self.elevator_id;
          FloorNumber my_floor = self.current_floor;
          Set<DestFloorButton> lit = select many from instances of DestFloorButton
              where [my_id, my_floor] |btn: DestFloorButton| -> Boolean {
                  return btn.r4_elevator_id == my_id
                      and btn.curr_state == Lit
                      and btn.r5_floor_num != my_floor;
              };
          return lit;
      - name: _pick_next_stop
        visibility: private
        scope: instance
        params:
          - name: lit_btns
            type: Set<DestFloorButton>
          - name: prev_direction
            type: Direction
        return: FloorNumber
        action: |
          FloorNumber my_floor = self.current_floor;

          // Sort ascending by floor number
          List<DestFloorButton> sorted_btns = lit_btns.sort(
              [] |a: DestFloorButton, b: DestFloorButton| -> Boolean {
                  return a.r5_floor_num < b.r5_floor_num;
              });
          Optional<DestFloorButton> first_btn = sorted_btns.peek_front();
          Optional<DestFloorButton> last_btn = sorted_btns.peek_back();

          // Priority 1: Continue in same direction if lit buttons exist that way
          if (prev_direction == Down and first_btn.value().r5_floor_num < my_floor) {
              List<DestFloorButton> below_sorted = lit_btns.filter(
                  [my_floor] |b: DestFloorButton| -> Boolean {
                      return b.r5_floor_num < my_floor;
                  }).sort(
                  [] |a: DestFloorButton, b: DestFloorButton| -> Boolean {
                      return a.r5_floor_num > b.r5_floor_num;
                  });
              return below_sorted.peek_front().value().r5_floor_num;
          } else if (prev_direction == Up and last_btn.value().r5_floor_num > my_floor) {
              List<DestFloorButton> above_sorted = lit_btns.filter(
                  [my_floor] |b: DestFloorButton| -> Boolean {
                      return b.r5_floor_num > my_floor;
                  }).sort(
                  [] |a: DestFloorButton, b: DestFloorButton| -> Boolean {
                      return a.r5_floor_num < b.r5_floor_num;
                  });
              return above_sorted.peek_front().value().r5_floor_num;
          }

          // Priority 2: Reverse — all lit buttons are in opposite direction
          if (first_btn.value().r5_floor_num > my_floor) {
              return first_btn.value().r5_floor_num;
          }
          return last_btn.value().r5_floor_num;

  - name: Shaft
    stereotype: entity
    attributes:
      - name: shaft_id
        type: UniqueID
        identifier: 1

  - name: Floor
    stereotype: entity
    attributes:
      - name: floor_num
        type: FloorNumber
        identifier: 1
      - name: is_top_floor
        type: Boolean
      - name: is_bottom_floor
        type: Boolean

  - name: ShaftFloor
    stereotype: entity
    attributes:
      - name: r2_shaft_id
        type: UniqueID
        identifier: 1
        referential: R2
      - name: r3_floor_num
        type: FloorNumber
        identifier: 1
        referential: R3
      - name: sensor_id
        type: Integer

  - name: DestFloorButton
    stereotype: active
    attributes:
      - name: r4_elevator_id
        type: UniqueID
        identifier: 1
        referential: R4
      - name: r5_floor_num
        type: FloorNumber
        identifier: 1
        referential: R5
      - name: pressed_at
        type: Timestamp
    methods:
      - name: press
        visibility: public
        scope: instance
        action: |
          self.pressed_at = now();
          generate Activated to self;

  - name: FloorCallButton
    stereotype: active
    attributes:
      - name: button_id
        type: UniqueID
        identifier: 1
      - name: direction
        type: CallDirection
      - name: pressed_at
        type: Timestamp
    methods:
      - name: press
        visibility: public
        scope: instance
        action: |
          self.pressed_at = now();
          generate Activated to self;

associations:
  # Elevator moves within a Shaft
  - name: R1
    point_1: Elevator
    point_2: Shaft
    1_mult_2: "1"
    2_mult_1: "1"
    1_phrase_2: moves within
    2_phrase_1: carries

  # Shaft has stops at ShaftFloors
  - name: R2
    point_1: Shaft
    point_2: ShaftFloor
    1_mult_2: "0..*"
    2_mult_1: "1"
    1_phrase_2: has stops at
    2_phrase_1: is a stop in

  # Floor is served by ShaftFloors
  - name: R3
    point_1: Floor
    point_2: ShaftFloor
    1_mult_2: "0..*"
    2_mult_1: "1"
    1_phrase_2: is served by
    2_phrase_1: serves

  # Elevator has DestFloorButtons
  - name: R4
    point_1: Elevator
    point_2: DestFloorButton
    1_mult_2: "2..*"
    2_mult_1: "1"
    1_phrase_2: has destination buttons for
    2_phrase_1: is inside

  # DestFloorButton represents a Floor
  - name: R5
    point_1: Floor
    point_2: DestFloorButton
    1_mult_2: "0..*"
    2_mult_1: "1"
    1_phrase_2: is a destination on
    2_phrase_1: represents

  # Floor has FloorCallButtons
  - name: R6
    point_1: Floor
    point_2: FloorCallButton
    1_mult_2: "0..2"
    2_mult_1: "1"
    1_phrase_2: has buttons at
    2_phrase_1: is located on

bridges:
  - to_domain: Building
    direction: required
    operations:
      - IsTopFloor
      - IsBottomFloor
  - to_domain: Transport
    direction: provided
    implementations:
      - name: ElevatorDetected
        action: |
          Optional<ShaftFloor> sf = select any from instances of ShaftFloor
              where [arg.sensor_id] |s: ShaftFloor| -> Boolean {
                  return s.sensor_id == arg.sensor_id;
              };
          Optional<Shaft> shaft = select any related by sf.value()->R2;
          Optional<Elevator> elev = select any related by shaft.value()->R1;
          Optional<Floor> floor = select any related by sf.value()->R3;
          generate Floor_reached(floor_num: floor.value().floor_num) to elev.value();
