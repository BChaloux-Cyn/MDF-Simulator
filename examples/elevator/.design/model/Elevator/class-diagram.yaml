schema_version: "1.0.0"
domain: Elevator
classes:
  - name: Elevator
    stereotype: active
    attributes:
      - name: elevator_id
        type: UniqueID
        identifier: true
      - name: current_floor
        type: FloorNumber
      - name: direction
        type: Direction
      - name: next_stop_floor
        type: FloorNumber
      - name: next_direction
        type: Direction
      - name: r14_request_id
        type: UniqueID
        referential: R14

  - name: Door
    stereotype: active
    attributes:
      - name: door_id
        type: UniqueID
        identifier: true
      - name: r1_elevator_id
        type: UniqueID
        referential: R1

  - name: Dispatcher
    stereotype: active
    attributes:
      - name: dispatcher_id
        type: UniqueID
        identifier: true
      - name: has_idle_elevator
        type: Boolean
      - name: queue_length
        type: Integer

  - name: Floor
    stereotype: active
    attributes:
      - name: floor_num
        type: FloorNumber
        identifier: true
      - name: is_top_floor
        type: Boolean
      - name: is_bottom_floor
        type: Boolean

  - name: Call
    stereotype: entity
    partitions:
      - name: R5
        subtypes:
          - ElevatorCall
          - FloorCall
    attributes:
      - name: call_id
        type: UniqueID
        identifier: true
      - name: r7_button_id
        type: UniqueID
        referential: R7
      - name: r8_request_id
        type: UniqueID
        referential: R8

  - name: ElevatorCall
    stereotype: active
    specializes: R5
    attributes:
      - name: destination_floor
        type: FloorNumber

  - name: FloorCall
    stereotype: active
    specializes: R5
    attributes:
      - name: floor_num
        type: FloorNumber
      - name: direction
        type: CallDirection

  - name: Request
    stereotype: active
    attributes:
      - name: request_id
        type: UniqueID
        identifier: true
      - name: destination_floor
        type: FloorNumber
      - name: r2_elevator_id
        type: UniqueID
        referential: R2
      - name: r9_next_id
        type: UniqueID
        referential: R9

  - name: CallButton
    stereotype: entity
    partitions:
      - name: R6
        subtypes:
          - DestFloorButton
          - FloorCallButton
    attributes:
      - name: button_id
        type: UniqueID
        identifier: true

  - name: DestFloorButton
    stereotype: entity
    specializes: R6
    attributes:
      - name: button_id
        type: UniqueID
        identifier: true
      - name: floor_num
        type: FloorNumber
      - name: r4_elevator_id
        type: UniqueID
        referential: R4

  - name: FloorCallButton
    stereotype: entity
    specializes: R6
    attributes:
      - name: button_id
        type: UniqueID
        identifier: true
      - name: direction
        type: CallDirection
      - name: r3_floor_num
        type: FloorNumber
        referential: R3

  - name: Shaft
    stereotype: active
    attributes:
      - name: shaft_id
        type: UniqueID
        identifier: true
      - name: current_floor
        type: FloorNumber

  - name: ElevatorIndicator
    stereotype: active
    attributes:
      - name: indicator_id
        type: UniqueID
        identifier: true
      - name: displayed_floor
        type: FloorNumber

  - name: FloorIndicator
    stereotype: active
    attributes:
      - name: indicator_id
        type: UniqueID
        identifier: true
      - name: direction
        type: Direction
      - name: r10_elevator_id
        type: UniqueID
        referential: R10
      - name: r13_floor_num
        type: FloorNumber
        referential: R13

associations:
  - name: R1
    point_1: Elevator
    point_2: Door
    1_mult_2: "1"
    2_mult_1: "1"
    1_phrase_2: is controlled by
    2_phrase_1: controls

  - name: R2
    point_1: Elevator
    point_2: Request
    1_mult_2: "0..*"
    2_mult_1: "1"
    1_phrase_2: has pending
    2_phrase_1: is pending for

  - name: R3
    point_1: Floor
    point_2: FloorCallButton
    1_mult_2: "0..2"
    2_mult_1: "1"
    1_phrase_2: has buttons at
    2_phrase_1: is located on

  - name: R4
    point_1: Elevator
    point_2: DestFloorButton
    1_mult_2: "0..*"
    2_mult_1: "1"
    1_phrase_2: has destination buttons for
    2_phrase_1: is inside

  - name: R5
    point_1: Call
    point_2: ElevatorCall
    1_mult_2: "1"
    2_mult_1: "1"
    1_phrase_2: is specialized as
    2_phrase_1: specializes

  - name: R6
    point_1: CallButton
    point_2: DestFloorButton
    1_mult_2: "1"
    2_mult_1: "1"
    1_phrase_2: is specialized as
    2_phrase_1: specializes

  - name: R7
    point_1: CallButton
    point_2: Call
    1_mult_2: "0..1"
    2_mult_1: "1"
    1_phrase_2: submitted
    2_phrase_1: was submitted by

  - name: R8
    point_1: Call
    point_2: Request
    1_mult_2: "0..1"
    2_mult_1: "0..1"
    1_phrase_2: is being served by
    2_phrase_1: serves

  - name: R9
    point_1: Request
    point_2: Request
    1_mult_2: "0..1"
    2_mult_1: "0..1"
    1_phrase_2: is followed by
    2_phrase_1: follows

  - name: R11
    point_1: Elevator
    point_2: Shaft
    1_mult_2: "1"
    2_mult_1: "1"
    1_phrase_2: moves within
    2_phrase_1: carries

  - name: R12
    point_1: Elevator
    point_2: ElevatorIndicator
    1_mult_2: "1"
    2_mult_1: "1"
    1_phrase_2: displays floor on
    2_phrase_1: shows floor for

  - name: R10
    point_1: Elevator
    point_2: FloorIndicator
    1_mult_2: "0..*"
    2_mult_1: "1"
    1_phrase_2: has indicator at
    2_phrase_1: shows floor for

  - name: R13
    point_1: Floor
    point_2: FloorIndicator
    1_mult_2: "0..*"
    2_mult_1: "1"
    1_phrase_2: has indicator
    2_phrase_1: is located on

  - name: R14
    point_1: Elevator
    point_2: Request
    1_mult_2: "0..1"
    2_mult_1: "0..1"
    1_phrase_2: has as queue head
    2_phrase_1: is queue head for

bridges:
  - to_domain: Building
    direction: required
    operations:
      - IsTopFloor
      - IsBottomFloor
