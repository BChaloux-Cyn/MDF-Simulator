schema_version: "1.0.0"
domain: Elevator
class: CarDoor
initial_state: Closed
events:
  - name: Open_cmd
  - name: Opened
  - name: Close_cmd
  - name: Closed_now
states:
  - name: Closed
    entry_action: |
      Elevator elev = self->R7;
      generate Door_closed to elev;
  - name: Opening
    entry_action: |
      // Tell the paired ShaftDoor to open — it will report back when done
      Elevator elev = self->R7;
      Set<ShaftFloor> shaft_floors = select many related by elev->R1->R2;
      Set<ShaftFloor> current_sf = shaft_floors.filter(
          [elev.current_floor] |s: ShaftFloor| -> Boolean {
              Floor f = s->R3;
              return f.floor_num == elev.current_floor;
          });
      ShaftFloor sf = current_sf.peek_front();
      ShaftDoor sd = sf->R8;
      generate Open_cmd to sd;
  - name: Open
    entry_action: |
      generate Close_cmd to self delay duration_s(5);
  - name: Closing
    entry_action: |
      // Tell the paired ShaftDoor to close — it will report back when done
      Elevator elev = self->R7;
      Set<ShaftFloor> shaft_floors = select many related by elev->R1->R2;
      Set<ShaftFloor> current_sf = shaft_floors.filter(
          [elev.current_floor] |s: ShaftFloor| -> Boolean {
              Floor f = s->R3;
              return f.floor_num == elev.current_floor;
          });
      ShaftFloor sf = current_sf.peek_front();
      ShaftDoor sd = sf->R8;
      generate Close_cmd to sd;
transitions:
  - from: Closed
    to: Opening
    event: Open_cmd
  - from: Opening
    to: Open
    event: Opened
  - from: Open
    to: Closing
    event: Close_cmd
  - from: Closing
    to: Closed
    event: Closed_now

  # Ignore Closed_now when already Closed (e.g. initial creation)
  - from: Closed
    to: Closed
    event: Closed_now
