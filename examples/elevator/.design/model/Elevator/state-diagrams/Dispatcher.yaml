schema_version: "1.0.0"
domain: Elevator
class: Dispatcher
initial_state: Idle
events:
  - name: Call_submitted
    params:
      - name: has_idle_elevator
        type: Boolean
  - name: Elevator_available
    params:
      - name: queue_length
        type: Integer
states:
  - name: Idle
    entry_action: "self.has_idle_elevator = True;"
  - name: Waiting
transitions:
  - from: Idle
    to: Idle
    event: Call_submitted
    guard: "rcvd_evt.has_idle_elevator == True"
    action: >-
      select any fc from instances of FloorCall where floor_num != 0;
      create req of Request;
      req.destination_floor = fc.floor_num;
      select any elev from instances of Elevator;
      generate Request_assigned(target_floor: req.destination_floor) to elev;
  - from: Idle
    to: Waiting
    event: Call_submitted
    guard: "rcvd_evt.has_idle_elevator != True"
  - from: Waiting
    to: Waiting
    event: Call_submitted
  - from: Waiting
    to: Waiting
    event: Elevator_available
    guard: "rcvd_evt.queue_length > 1"
    action: >-
      select any fc from instances of FloorCall where floor_num != 0;
      create req of Request;
      req.destination_floor = fc.floor_num;
      select any elev from instances of Elevator;
      generate Request_assigned(target_floor: req.destination_floor) to elev;
  - from: Waiting
    to: Idle
    event: Elevator_available
    guard: "rcvd_evt.queue_length == 1"
    action: >-
      select any fc from instances of FloorCall where floor_num != 0;
      create req of Request;
      req.destination_floor = fc.floor_num;
      select any elev from instances of Elevator;
      generate Request_assigned(target_floor: req.destination_floor) to elev;
