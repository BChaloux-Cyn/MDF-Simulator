schema_version: "1.0.0"
domain: Elevator
class: ElevatorIndicator
initial_state: Displaying
events:
  - name: Floor_updated
    params:
      - name: floor_num
        type: FloorNumber
states:
  - name: Displaying
    entry_action: "self.displayed_floor = floor_num;"
transitions:
  - from: Displaying
    to: Displaying
    event: Floor_updated
