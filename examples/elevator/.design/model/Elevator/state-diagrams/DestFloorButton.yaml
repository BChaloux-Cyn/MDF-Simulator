schema_version: "1.0.0"
domain: Elevator
class: DestFloorButton
initial_state: Idle
events:
  - name: Activated
  - name: Floor_served
    params:
      - name: floor_num
        type: FloorNumber
states:
  - name: Idle
  - name: Lit
transitions:
  - from: Idle
    to: Lit
    event: Activated
  - from: Lit
    to: Idle
    event: Floor_served
    guard: "rcvd_evt.floor_num == self.r5_floor_num"
  - from: Lit
    to: Lit
    event: Floor_served
    guard: "rcvd_evt.floor_num != self.r5_floor_num"
