schema_version: "1.0.0"
domain: Elevator
class: FloorIndicator
initial_state: "Off"
events:
  - name: Direction_set
    params:
      - name: direction
        type: Direction
  - name: Reset
states:
  - name: "Off"
  - name: Showing_Up
    entry_action: "self.direction = Up;"
  - name: Showing_Down
    entry_action: "self.direction = Down;"
transitions:
  - from: "Off"
    to: Showing_Up
    event: Direction_set
    guard: "rcvd_evt.direction == Up"
  - from: "Off"
    to: Showing_Down
    event: Direction_set
    guard: "rcvd_evt.direction == Down"
  - from: "Off"
    to: "Off"
    event: Direction_set
    guard: "rcvd_evt.direction == Stopped"
  - from: Showing_Up
    to: "Off"
    event: Reset
  - from: Showing_Down
    to: "Off"
    event: Reset
  - from: Showing_Up
    to: Showing_Down
    event: Direction_set
    guard: "rcvd_evt.direction == Down"
  - from: Showing_Up
    to: "Off"
    event: Direction_set
    guard: "rcvd_evt.direction == Stopped"
  - from: Showing_Down
    to: Showing_Up
    event: Direction_set
    guard: "rcvd_evt.direction == Up"
  - from: Showing_Down
    to: "Off"
    event: Direction_set
    guard: "rcvd_evt.direction == Stopped"
