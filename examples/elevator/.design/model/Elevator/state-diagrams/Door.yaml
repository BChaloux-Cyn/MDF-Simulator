schema_version: "1.0.0"
domain: Elevator
class: Door
initial_state: Closed
events:
  - name: Open_door
  - name: Door_timer_expired
  - name: Obstruction_detected
states:
  - name: Closed
    entry_action: "generate Door_closed to r1_elevator_id;"
  - name: Opening
  - name: Open
  - name: Closing
transitions:
  - from: Closed
    to: Opening
    event: Open_door
  - from: Opening
    to: Open
    event: Door_timer_expired
  - from: Open
    to: Closing
    event: Door_timer_expired
  - from: Closing
    to: Closed
    event: Door_timer_expired
  - from: Closing
    to: Opening
    event: Obstruction_detected
