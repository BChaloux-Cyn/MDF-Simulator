schema_version: "1.0.0"
domain: Elevator
class: Request
initial_state: Pending
events:
  - name: Elevator_assigned
  - name: Elevator_arrived
  - name: Door_closed
  - name: Request_cancelled
states:
  - name: Pending
  - name: Assigned
  - name: Serving
  - name: Complete
    entry_action: "generate Service_complete to self.r2_elevator_id;"
    terminal: true
  - name: Cancelled
    terminal: true
transitions:
  - from: Pending
    to: Assigned
    event: Elevator_assigned
  - from: Pending
    to: Cancelled
    event: Request_cancelled
  - from: Assigned
    to: Serving
    event: Elevator_arrived
  - from: Assigned
    to: Cancelled
    event: Request_cancelled
  - from: Serving
    to: Complete
    event: Door_closed
