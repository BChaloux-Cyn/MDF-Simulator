schema_version: "1.0.0"
domain: Elevator
class: Elevator
initial_state: Idle
events:
  - name: Floor_assigned
    params:
      - name: floor_num
        type: FloorNumber
  - name: Floor_reached
    params:
      - name: floor_num
        type: FloorNumber
  - name: Ready
  - name: At_Destination
  - name: Continue
  - name: Arrived
  - name: Door_closed
states:
  - name: Idle
  - name: Departing
    entry_action: |
      if (self.next_stop_floor > self.current_floor) {
          self.direction = Up;
      } else {
          self.direction = Down;
      }
      generate Ready to self;
  - name: Moving
  - name: Floor_Updating
    entry_action: |
      self.current_floor = rcvd_evt.floor_num;
      if (self.current_floor == self.next_stop_floor) {
          generate At_Destination to self;
      } else {
          generate Continue to self;
      }
  - name: Arriving
    entry_action: |
      Direction prev_direction = self.direction;
      self.direction = None;

      // Notify all DestFloorButtons — current floor's button transitions Lit->Idle
      Set<DestFloorButton> buttons = select many related by self->R4;
      generate Floor_served(floor_num: self.current_floor) to buttons;

      // Find remaining lit buttons (excluding current floor, just served)
      Set<DestFloorButton> lit_btns = self._get_lit_buttons();

      if (lit_btns.is_empty()) {
          // No work — go Idle when door closes
          self.next_stop_floor = self.current_floor;
          generate Arrived to self;
          return;
      }

      self.next_stop_floor = self._pick_next_stop(lit_btns, prev_direction);
      generate Arrived to self;
  - name: Exchanging
transitions:
  # From Idle — only way out is a floor assignment
  - from: Idle
    to: Departing
    event: Floor_assigned
    action: "self.next_stop_floor = rcvd_evt.floor_num;"

  # Departing sets direction and indicators, enters Moving
  - from: Departing
    to: Moving
    event: Ready

  # Moving receives floor updates
  - from: Moving
    to: Floor_Updating
    event: Floor_reached

  # Floor_Updating decides: keep going or stop
  - from: Floor_Updating
    to: Arriving
    event: At_Destination
  - from: Floor_Updating
    to: Moving
    event: Continue

  # Arriving notifies buttons and indicators, enters Exchanging
  - from: Arriving
    to: Exchanging
    event: Arrived

  # Exchanging can receive new destinations while parked
  - from: Exchanging
    to: Exchanging
    event: Floor_assigned
    action: "self.next_stop_floor = rcvd_evt.floor_num;"

  # Door closes — check if we have work
  - from: Exchanging
    to: Departing
    event: Door_closed
    guard: "self.next_stop_floor != self.current_floor"
  - from: Exchanging
    to: Idle
    event: Door_closed
    guard: "self.next_stop_floor == self.current_floor"
