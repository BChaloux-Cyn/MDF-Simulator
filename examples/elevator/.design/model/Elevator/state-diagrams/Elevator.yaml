schema_version: "1.0.0"
domain: Elevator
class: Elevator
initial_state: Idle
events:
  - name: Floor_assigned
    params:
      - name: floor_num
        type: FloorNumber
  - name: Floor_reached
    params:
      - name: floor_num
        type: FloorNumber
  - name: Ready
  - name: At_Destination
  - name: Continue
  - name: Arrived
  - name: Door_closed
states:
  - name: Idle
  - name: Departing
    entry_action: |
      self.next_stop_floor = rcvd_evt.floor_num;
      if (self.next_stop_floor > self.current_floor) {
          self.direction = Up;
      } else {
          self.direction = Down;
      }
      generate Ready to self;
  - name: Moving
  - name: Floor_Updating
    entry_action: |
      self.current_floor = rcvd_evt.floor_num;
      if (self.current_floor == self.next_stop_floor) {
          generate At_Destination to self;
      } else {
          generate Continue to self;
      }
  - name: Arriving
    entry_action: |
      Direction prev_direction = self.direction;
      self.direction = None;

      // Find lit DestFloorButtons (excluding current floor)
      Set<DestFloorButton> lit_btns = self._get_lit_buttons();

      if (lit_btns.is_empty()) {
          // No destination buttons — check for lit FloorCallButtons
          Set<ShaftFloor> shaft_floors = select many related by self->R1->R2;
          Set<FloorCallButton> lit_calls = shaft_floors.flat_map(
              [] |sf: ShaftFloor| -> Set<FloorCallButton> {
                  Floor f = sf->R3;
                  return select many related by f->R6
                      where [] |btn: FloorCallButton| -> Boolean {
                          return btn.curr_state == Lit;
                      };
              });

          if (lit_calls.is_empty()) {
              // No work at all — go Idle when door closes
              self.next_stop_floor = self.current_floor;
              generate Arrived to self;
              return;
          }

          // Pick the earliest pressed FloorCallButton
          List<FloorCallButton> sorted_calls = lit_calls.sort(
              [] |a: FloorCallButton, b: FloorCallButton| -> Boolean {
                  return a.pressed_at < b.pressed_at;
              });
          FloorCallButton earliest = sorted_calls.peek_front();
          Floor target_floor = earliest->R6;
          self.next_stop_floor = target_floor.floor_num;
          generate Arrived to self;
          return;
      }

      self.next_stop_floor = self._pick_next_stop(lit_btns, prev_direction);
      generate Arrived to self;
  - name: Exchanging
    entry_action: |
      self.next_stop_floor = rcvd_evt.floor_num;
      // Find the specific DestFloorButton for the current floor and notify it
      Set<DestFloorButton> dest_buttons = select many related by self->R4
          where [self.current_floor] |btn: DestFloorButton| -> Boolean {
              Floor f = btn->R5;
              return btn.curr_state == Lit and f.floor_num == self.current_floor;
          };
      generate Floor_served to dest_buttons;

      // Notify FloorCallButtons at current floor — transitions Lit->Idle
      Set<ShaftFloor> shaft_floors = select many related by self->R1->R2;
      Set<ShaftFloor> current_sf = shaft_floors.filter(
          [self.current_floor] |s: ShaftFloor| -> Boolean {
              Floor f = s->R3;
              return f.floor_num == self.current_floor;
          });
      ShaftFloor sf = current_sf.peek_front();
      Floor floor = sf->R3;
      Set<FloorCallButton> call_buttons = select many related by floor->R6
          where [] |btn: FloorCallButton| -> Boolean {
              return btn.curr_state == Lit;
          };
      generate Call_served to call_buttons;

      // Open the car door — it will open the paired shaft door
      CarDoor car_door = self->R7;
      generate Open_cmd to car_door;
transitions:
  # From Idle — only way out is a floor assignment
  - from: Idle
    to: Departing
    event: Floor_assigned

  # Departing sets direction and indicators, enters Moving
  - from: Departing
    to: Moving
    event: Ready

  # Moving receives floor updates
  - from: Moving
    to: Floor_Updating
    event: Floor_reached

  # Floor_Updating decides: keep going or stop
  - from: Floor_Updating
    to: Arriving
    event: At_Destination
  - from: Floor_Updating
    to: Moving
    event: Continue

  # Arriving notifies buttons and indicators, enters Exchanging
  - from: Arriving
    to: Exchanging
    event: Arrived

  # Exchanging can receive new destinations while parked
  - from: Exchanging
    to: Exchanging
    event: Floor_assigned

  # Door closes — check if we have work
  - from: Exchanging
    to: Departing
    event: Door_closed
    guard: "self.next_stop_floor != self.current_floor"
  - from: Exchanging
    to: Idle
    event: Door_closed
    guard: "self.next_stop_floor == self.current_floor"

  # Ignore Door_closed when already Idle (e.g. initial creation)
  - from: Idle
    to: Idle
    event: Door_closed
