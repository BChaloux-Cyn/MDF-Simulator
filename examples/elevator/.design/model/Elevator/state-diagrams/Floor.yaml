schema_version: "1.0.0"
domain: Elevator
class: Floor
initial_state: Available
events:
  - name: Elevator_arrived
  - name: Elevator_departed
states:
  - name: Available
  - name: Serving
    entry_action: >-
      select any fc from instances of FloorCall where floor_num == self.floor_num;
      if fc != empty; generate Elevator_arrived to fc; end if;
transitions:
  - from: Available
    to: Serving
    event: Elevator_arrived
  - from: Serving
    to: Available
    event: Elevator_departed
