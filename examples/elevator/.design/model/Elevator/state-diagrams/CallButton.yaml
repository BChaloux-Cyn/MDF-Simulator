schema_version: "1.0.0"
domain: Elevator
class: CallButton
initial_state: Unlit
events:
  - name: Button_pushed
  - name: Call_fulfilled
states:
  - name: Unlit
  - name: Lit
transitions:
  - from: Unlit
    to: Lit
    event: Button_pushed
    action: >-
      create ec of ElevatorCall;
      relate ec to self across R7;
      select any disp from instances of Dispatcher;
      generate Call_submitted(has_idle_elevator: disp.has_idle_elevator) to disp;
  - from: Lit
    to: Unlit
    event: Call_fulfilled
